<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINABUNG | PROFESSIONAL MONITORING</title>
    
    <!-- Theme Preload Script (must run before body renders) -->
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    
    <!-- External Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Tailwind Config -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              mainbgDark: '#07090F',
              mainbgLight: '#F1F5F9',
              glassbgDark: 'rgba(13, 17, 28, 0.75)',
              glassbgLight: 'rgba(255, 255, 255, 0.85)',
              borderDark: 'rgba(255, 255, 255, 0.08)',
              borderLight: 'rgba(0, 0, 0, 0.08)',
              primary: '#0EA5E9',
              secondary: '#6366F1',
              accent: '#F43F5E',
              success: '#10B981',
              warning: '#F59E0B'
            },
            fontFamily: {
              outfit: ['Outfit', 'sans-serif'],
              inter: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fade-in': 'fadeIn 0.4s ease-out forwards',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px rgba(14, 165, 233, 0.2), 0 0 10px rgba(14, 165, 233, 0.1)' },
                '100%': { boxShadow: '0 0 15px rgba(14, 165, 233, 0.5), 0 0 25px rgba(14, 165, 233, 0.3)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            }
          }
        }
      }
    </script>

    <!-- Global CSS -->
    <style>
        :root {
            --primary: #0EA5E9;
            --secondary: #6366F1;
            --success: #10B981;
            --warning: #F59E0B;
            --accent: #F43F5E;
        }

        @layer base {
            html { scroll-behavior: smooth; }
            body { @apply font-inter antialiased; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.4); }
        
        /* Premium Background Effects */
        .dark body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .glass-panel {
            @apply border transition-all duration-300;
            background: #FFFFFF;
            border-color: theme('colors.borderLight');
        }
        .dark .glass-panel {
            background: #0A0D14;
            border-color: theme('colors.borderDark');
        }

        .stat-card {
            @apply relative overflow-hidden rounded-2xl border transition-all duration-300 hover:shadow-lg;
            background: #FFFFFF;
            border-color: theme('colors.borderLight');
        }
        .dark .stat-card {
            background: #0A0D14;
            border-color: theme('colors.borderDark');
        }

        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0,
                rgba(255, 255, 255, 0.05) 20%,
                rgba(255, 255, 255, 0.1) 60%,
                rgba(255, 255, 255, 0)
            );
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer { 100% { transform: translateX(100%); } }

        .status-dot { @apply w-2 h-2 rounded-full relative; }
        .status-dot::after {
            content: '';
            @apply absolute inset-0 rounded-full animate-ping opacity-75;
            background: inherit;
        }
    </style>
</head>
<body class="bg-mainbgLight dark:bg-mainbgDark text-slate-800 dark:text-slate-200 font-inter min-h-screen transition-colors duration-300">
    
    {% include 'components/sidebar.html' %}

    <main class="ml-64 p-8 max-w-[1600px] mx-auto min-h-screen">
        <div class="flex flex-col gap-8">
            {% include 'components/header.html' %}

            {% include 'components/views/dashboard_view.html' %}
            {% include 'components/views/control_view.html' %}
            {% include 'components/views/database_view.html' %}
            {% include 'components/views/filemanager_view.html' %}
        </div>
    </main>

    <!-- Modular JavaScript (order matters) -->
    <script src="{{ url_for('static', filename='js/navigation.js') }}"></script>
    <script src="{{ url_for('static', filename='js/terminal.js') }}"></script>
    <script src="{{ url_for('static', filename='js/db_manager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/charts.js') }}"></script>
    <script src="{{ url_for('static', filename='js/filemanager.js') }}"></script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>

    <!-- Init -->
    <script>
        showPage('dashboard');
    </script>
</body>
</html>
