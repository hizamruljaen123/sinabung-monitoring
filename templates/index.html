<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINABUNG | PROFESSIONAL MONITORING</title>
    
    <!-- Theme Script -->
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              mainbgDark: '#07090F',
              mainbgLight: '#F1F5F9',
              glassbgDark: 'rgba(13, 17, 28, 0.75)',
              glassbgLight: 'rgba(255, 255, 255, 0.85)',
              borderDark: 'rgba(255, 255, 255, 0.08)',
              borderLight: 'rgba(0, 0, 0, 0.08)',
              primary: '#0EA5E9',
              secondary: '#6366F1',
              accent: '#F43F5E',
              success: '#10B981',
              warning: '#F59E0B'
            },
            fontFamily: {
              outfit: ['Outfit', 'sans-serif'],
              inter: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            animation: {
              'pulse-fast': 'pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'glow': 'glow 2s ease-in-out infinite alternate',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'fade-in': 'fadeIn 0.4s ease-out forwards',
            },
            keyframes: {
              glow: {
                '0%': { boxShadow: '0 0 5px rgba(14, 165, 233, 0.2), 0 0 10px rgba(14, 165, 233, 0.1)' },
                '100%': { boxShadow: '0 0 15px rgba(14, 165, 233, 0.5), 0 0 25px rgba(14, 165, 233, 0.3)' },
              },
              slideUp: {
                '0%': { transform: 'translateY(20px)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' },
              },
              fadeIn: {
                '0%': { opacity: '0' },
                '100%': { opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
        :root {
            --primary: #0EA5E9;
            --secondary: #6366F1;
            --success: #10B981;
            --warning: #F59E0B;
            --accent: #F43F5E;
        }

        @layer base {
            html { scroll-behavior: smooth; }
            body { @apply font-inter antialiased; }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.4); }
        
        /* Premium Background Effects */
        .dark body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 0% 0%, rgba(14, 165, 233, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(99, 102, 241, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        .glass-panel {
            @apply border transition-all duration-300;
            background: #FFFFFF;
            border-color: theme('colors.borderLight');
        }
        .dark .glass-panel {
            background: #0A0D14;
            border-color: theme('colors.borderDark');
        }

        .stat-card {
            @apply relative overflow-hidden rounded-2xl border transition-all duration-300 hover:shadow-lg;
            background: #FFFFFF;
            border-color: theme('colors.borderLight');
        }
        .dark .stat-card {
            background: #0A0D14;
            border-color: theme('colors.borderDark');
        }

        .shimmer {
            position: relative;
            overflow: hidden;
        }
        .shimmer::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            transform: translateX(-100%);
            background-image: linear-gradient(
                90deg,
                rgba(255, 255, 255, 0) 0,
                rgba(255, 255, 255, 0.05) 20%,
                rgba(255, 255, 255, 0.1) 60%,
                rgba(255, 255, 255, 0)
            );
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            100% { transform: translateX(100%); }
        }

        .status-dot {
            @apply w-2 h-2 rounded-full relative;
        }
        .status-dot::after {
            content: '';
            @apply absolute inset-0 rounded-full animate-ping opacity-75;
            background: inherit;
        }
    </style>
</head>
<body class="bg-mainbgLight dark:bg-mainbgDark text-slate-800 dark:text-slate-200 font-inter min-h-screen transition-colors duration-300">
    
    {% include 'components/sidebar.html' %}

    <main class="ml-64 p-8 max-w-[1600px] mx-auto min-h-screen">
        <div class="flex flex-col gap-8">
            {% include 'components/header.html' %}

            <!-- Dashboard View -->
            <div id="dashboard-view" class="page-view flex flex-col gap-8">
                <div class="grid grid-cols-1 xl:grid-cols-[380px_1fr] gap-8 items-start">
                    <!-- Left Column -->
                    <div class="flex flex-col gap-8">
                        {% include 'components/cards.html' %}
                        {% include 'components/database.html' %}
                    </div>

                    <!-- Right Column -->
                    <div class="flex flex-col gap-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="glass-panel rounded-[2rem] p-6 shadow-xl animate-slide-up" style="animation-delay: 0.1s">
                                <canvas id="cpuChart" height="200"></canvas>
                            </div>
                            <div class="glass-panel rounded-[2rem] p-6 shadow-xl animate-slide-up" style="animation-delay: 0.2s">
                                <canvas id="ramChart" height="200"></canvas>
                            </div>
                        </div>
                        {% include 'components/table.html' %}
                    </div>
                </div>
            </div>

            <!-- Server Control View -->
            <div id="control-view" class="page-view hidden flex flex-col gap-8 animate-fade-in">
                <div class="grid grid-cols-1 xl:grid-cols-[300px_1fr] gap-8">
                    <!-- Controls Sidebar -->
                    <div class="flex flex-col gap-6">
                        <div class="bg-white dark:bg-[#0A0D14] border border-slate-200 dark:border-white/5 rounded-2xl p-6 shadow-sm">
                            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Git Operations</h3>
                            <div class="flex flex-col gap-3">
                                <button onclick="runGit('pull')" class="flex items-center justify-center gap-2 w-full py-3 bg-primary text-white rounded-xl font-bold text-sm hover:opacity-90 transition shadow-lg shadow-primary/20">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
                                    GIT PULL
                                </button>
                                <button onclick="runGit('stash')" class="flex items-center justify-center gap-2 w-full py-3 bg-slate-100 dark:bg-white/5 text-slate-600 dark:text-slate-300 rounded-xl font-bold text-sm border border-slate-200 dark:border-white/10 hover:bg-slate-200 dark:hover:bg-white/10 transition">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M2 12h20"/></svg>
                                    GIT STASH
                                </button>
                            </div>
                        </div>

                        <div class="bg-white dark:bg-[#0A0D14] border border-slate-200 dark:border-white/5 rounded-2xl p-6 shadow-sm">
                            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Log Streaming</h3>
                            <div class="flex flex-col gap-2">
                                <button id="btn-log-0" onclick="startLogStream(0)" class="log-tab active px-4 py-3 rounded-xl border border-primary bg-primary/5 text-primary text-xs font-bold text-left flex items-center justify-between group">
                                    <span>BACKEND (ID: 0)</span>
                                    <div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
                                </button>
                                <button id="btn-log-1" onclick="startLogStream(1)" class="log-tab px-4 py-3 rounded-xl border border-transparent bg-slate-50 dark:bg-white/[0.02] text-slate-500 dark:text-slate-400 text-xs font-bold text-left flex items-center justify-between hover:bg-slate-100 dark:hover:bg-white/5 transition">
                                    <span>FRONTEND (ID: 1)</span>
                                    <div class="w-1.5 h-1.5 rounded-full bg-slate-400 group-hover:bg-primary transition-colors"></div>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Terminal View -->
                    <div class="flex flex-col gap-4">
                        <div class="bg-[#05070A] rounded-2xl border border-slate-800 shadow-2xl overflow-hidden flex flex-col h-[700px]">
                            <div class="px-6 py-3 bg-slate-900/50 border-b border-slate-800 flex justify-between items-center">
                                <div class="flex items-center gap-2">
                                    <div class="flex gap-1.5">
                                        <div class="w-2.5 h-2.5 rounded-full bg-rose-500/50"></div>
                                        <div class="w-2.5 h-2.5 rounded-full bg-amber-500/50"></div>
                                        <div class="w-2.5 h-2.5 rounded-full bg-emerald-500/50"></div>
                                    </div>
                                    <span class="text-[10px] font-mono text-slate-500 uppercase ml-4 tracking-widest">Sinabung_Terminal_v4.0</span>
                                </div>
                                <button onclick="clearTerminal()" class="text-[10px] font-bold text-slate-500 hover:text-white transition">CLEAR_BUFFER</button>
                            </div>
                            <div id="terminal-content" class="flex-grow p-6 font-mono text-xs text-slate-300 overflow-y-auto custom-scrollbar whitespace-pre-wrap leading-relaxed">
                                <div class="text-primary opacity-50 mb-4 tracking-tighter">SINABUNG_SHELL // INITIALIZING_STREAM...</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Global State ---
        let logEventSource = null;
        let currentAppId = null;

        // --- Theme Toggle Logic ---
        const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
            document.documentElement.classList.add('dark');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
            document.documentElement.classList.remove('dark');
        }

        document.getElementById('theme-toggle').addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('color-theme', 'light');
                updateChartColors(false);
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('color-theme', 'dark');
                updateChartColors(true);
            }
        });

        // --- Navigation Logic ---
        function showPage(pageId) {
            document.querySelectorAll('.page-view').forEach(p => p.classList.add('hidden'));
            document.getElementById(pageId + '-view').classList.remove('hidden');
            
            // Update Sidebar Active State
            document.querySelectorAll('.nav-item').forEach(n => {
                n.classList.remove('bg-primary/10', 'text-primary', 'border-primary/20', 'font-semibold');
                n.classList.add('text-slate-500', 'dark:text-slate-400');
            });
            const activeNav = document.getElementById('nav-' + pageId);
            activeNav.classList.remove('text-slate-500', 'dark:text-slate-400');
            activeNav.classList.add('bg-primary/10', 'text-primary', 'border-primary/20', 'font-semibold');

            if (pageId === 'control') {
                startLogStream(0); // Default to BE logs
            } else {
                stopLogStream();
            }
        }

        // --- Git Logic ---
        async function runGit(action) {
            const terminal = document.getElementById('terminal-content');
            terminal.innerHTML += `\n\n<span class="text-primary font-bold">>>> EXECUTING GIT ${action.toUpperCase()}...</span>\n`;
            terminal.scrollTop = terminal.scrollHeight;

            try {
                const resp = await fetch(`/api/git-${action}`, { method: 'POST' });
                const data = await resp.json();
                
                const colorClass = data.status === 'success' ? 'text-success' : 'text-accent';
                terminal.innerHTML += `<div class="${colorClass} mt-2 bg-white/5 p-3 rounded-lg border border-white/5">${data.output}</div>`;
            } catch (err) {
                terminal.innerHTML += `<div class="text-accent mt-2">FATAL: Execution failed. System unreachable.</div>`;
            }
            terminal.scrollTop = terminal.scrollHeight;
        }

        // --- Log Streaming Logic ---
        function startLogStream(appId) {
            if (currentAppId === appId) return;
            stopLogStream();
            
            currentAppId = appId;
            const terminal = document.getElementById('terminal-content');
            terminal.innerHTML = `<div class="text-primary opacity-50 mb-4 tracking-tighter">CONNECTED_TO_APP_ID: ${appId} // FETCHING_REALTIME_STREAM...</div>`;
            
            // Update UI tabs
            document.querySelectorAll('.log-tab').forEach(t => {
                t.classList.remove('border-primary', 'bg-primary/5', 'text-primary');
                t.classList.add('border-transparent', 'bg-slate-50', 'dark:bg-white/[0.02]', 'text-slate-500', 'dark:text-slate-400');
                t.querySelector('div').classList.remove('bg-primary', 'animate-pulse');
                t.querySelector('div').classList.add('bg-slate-400');
            });
            
            const activeTab = document.getElementById(`btn-log-${appId}`);
            activeTab.classList.add('border-primary', 'bg-primary/5', 'text-primary');
            activeTab.classList.remove('border-transparent', 'bg-slate-50', 'dark:bg-white/[0.02]', 'text-slate-500', 'dark:text-slate-400');
            activeTab.querySelector('div').classList.add('bg-primary', 'animate-pulse');
            activeTab.querySelector('div').classList.remove('bg-slate-400');

            logEventSource = new EventSource(`/api/logs/${appId}`);
            logEventSource.onmessage = function(event) {
                const line = document.createElement('div');
                line.className = 'mb-1 border-l-2 border-white/5 pl-3 hover:bg-white/5 transition-colors';
                line.textContent = event.data;
                terminal.appendChild(line);
                
                // Keep only last 200 lines
                if (terminal.childNodes.length > 200) {
                    terminal.removeChild(terminal.childNodes[0]);
                }
                terminal.scrollTop = terminal.scrollHeight;
            };
            
            logEventSource.onerror = function() {
                terminal.innerHTML += `<div class="text-accent font-bold mt-4">STREAM_INTERRUPTED: Retrying connection...</div>`;
                stopLogStream();
            };
        }

        function stopLogStream() {
            if (logEventSource) {
                logEventSource.close();
                logEventSource = null;
                currentAppId = null;
            }
        }

        function clearTerminal() {
            document.getElementById('terminal-content').innerHTML = `<div class="text-primary opacity-50 mb-4 tracking-tighter">BUFFER_CLEARED // WAITING_FOR_DATA...</div>`;
        }

        // --- Chart Configuration ---
        const MAX_DATA_POINTS = 40;
        let chartLabels = [];
        let cpuData = [];
        let ramData = [];

        function getChartConfig(isDark) {
            const gridColor = isDark ? 'rgba(255, 255, 255, 0.03)' : 'rgba(0, 0, 0, 0.03)';
            const textColor = isDark ? '#64748B' : '#94A3B8';
            
            return {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { 
                        display: true,
                        grid: { display: false },
                        ticks: { display: false }
                    },
                    y: { 
                        beginAtZero: true,
                        max: 100,
                        grid: { color: gridColor, drawBorder: false },
                        ticks: { 
                            color: textColor, 
                            font: { size: 10, family: 'JetBrains Mono', weight: '500' },
                            padding: 10,
                            callback: value => value + '%'
                        }
                    }
                },
                plugins: { 
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: isDark ? '#1E293B' : '#FFFFFF',
                        titleColor: isDark ? '#F1F5F9' : '#0F172A',
                        bodyColor: isDark ? '#F1F5F9' : '#0F172A',
                        padding: 12,
                        cornerRadius: 12,
                        displayColors: false,
                        borderWidth: 1,
                        borderColor: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
                    }
                },
                elements: {
                    line: { tension: 0.4, borderWidth: 3, capStyle: 'round' },
                    point: { radius: 0, hoverRadius: 6, hitRadius: 10 }
                },
                interaction: { intersect: false, mode: 'index' }
            };
        }

        const ctxCpu = document.getElementById('cpuChart').getContext('2d');
        const ctxRam = document.getElementById('ramChart').getContext('2d');

        const cpuGradient = ctxCpu.createLinearGradient(0, 0, 0, 200);
        cpuGradient.addColorStop(0, 'rgba(14, 165, 233, 0.2)');
        cpuGradient.addColorStop(1, 'rgba(14, 165, 233, 0)');

        const ramGradient = ctxRam.createLinearGradient(0, 0, 0, 200);
        ramGradient.addColorStop(0, 'rgba(99, 102, 241, 0.2)');
        ramGradient.addColorStop(1, 'rgba(99, 102, 241, 0)');

        const isDarkInitial = document.documentElement.classList.contains('dark');

        const cpuChart = new Chart(ctxCpu, {
            type: 'line',
            data: { labels: chartLabels, datasets: [{ 
                label: 'CPU Load', data: cpuData, 
                borderColor: '#0EA5E9', 
                backgroundColor: cpuGradient,
                fill: true 
            }]},
            options: { ...getChartConfig(isDarkInitial), plugins: { ...getChartConfig(isDarkInitial).plugins, title: { display: true, text: 'CORE PROCESSOR LOAD', align: 'start', color: isDarkInitial ? '#F1F5F9' : '#0F172A', font: { family: 'Outfit', size: 14, weight: '700' }, padding: { bottom: 20 } } } }
        });

        const ramChart = new Chart(ctxRam, {
            type: 'line',
            data: { labels: chartLabels, datasets: [{ 
                label: 'RAM Usage', data: ramData, 
                borderColor: '#6366F1', 
                backgroundColor: ramGradient,
                fill: true 
            }]},
            options: { ...getChartConfig(isDarkInitial), plugins: { ...getChartConfig(isDarkInitial).plugins, title: { display: true, text: 'GLOBAL MEMORY POOL', align: 'start', color: isDarkInitial ? '#F1F5F9' : '#0F172A', font: { family: 'Outfit', size: 14, weight: '700' }, padding: { bottom: 20 } } } }
        });

        function updateChartColors(isDark) {
            const options = getChartConfig(isDark);
            const titleColor = isDark ? '#F1F5F9' : '#0F172A';
            
            cpuChart.options = { ...options, plugins: { ...options.plugins, title: { display: true, text: 'CORE PROCESSOR LOAD', align: 'start', color: titleColor, font: { family: 'Outfit', size: 14, weight: '700' }, padding: { bottom: 20 } } } };
            ramChart.options = { ...options, plugins: { ...options.plugins, title: { display: true, text: 'GLOBAL MEMORY POOL', align: 'start', color: titleColor, font: { family: 'Outfit', size: 14, weight: '700' }, padding: { bottom: 20 } } } };
            
            cpuChart.update();
            ramChart.update();
        }

        // Helper to get color value safely
        function getColor(name) {
            return getComputedStyle(document.documentElement).getPropertyValue(name).trim() || "#000";
        }

        function getHeatmapColor(value, max) {
            const ratio = Math.min(value / max, 1);
            if (ratio < 0.4) return getColor("--success");
            if (ratio < 0.75) return getColor("--warning");
            return getColor("--accent");
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('last-update').innerText = `SYNCHRONIZED: ${data.time}`;
                
                // Update Metrics Cards with Professional Style
                const active = data.services.filter(s => s.status === 'ONLINE').length;
                const total = data.services.length;
                const healthRatio = (active / total) * 100;
                
                document.getElementById('metrics-container').innerHTML = `
                    <div class="grid grid-cols-1 gap-4">
                        <div class="stat-card p-5 group">
                            <div class="flex justify-between items-center mb-3">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">CPU UTILIZATION</p>
                                <span class="text-[9px] font-bold text-primary bg-primary/5 border border-primary/10 px-1.5 py-0.5 rounded">REAL-TIME</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <h3 class="text-2xl font-bold font-mono text-slate-800 dark:text-white">${data.total_cpu}%</h3>
                                <div class="w-1.5 h-1.5 rounded-full bg-success"></div>
                            </div>
                        </div>

                        <div class="stat-card p-5 group">
                            <div class="flex justify-between items-center mb-3">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">MEMORY ALLOCATION</p>
                                <span class="text-[9px] font-bold text-secondary bg-secondary/5 border border-secondary/10 px-1.5 py-0.5 rounded">${data.ram_percent}%</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <h3 class="text-2xl font-bold font-mono text-slate-800 dark:text-white">${data.total_ram}</h3>
                                <span class="text-[10px] text-slate-400 font-bold tracking-tighter uppercase">GB / ${data.total_ram_capacity} GB</span>
                            </div>
                        </div>

                        <div class="stat-card p-5 group">
                            <div class="flex justify-between items-center mb-3">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">ACTIVE CLUSTER NODES</p>
                                <span class="text-[9px] font-bold text-success bg-success/5 border border-success/10 px-1.5 py-0.5 rounded">OPTIMAL</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <h3 class="text-2xl font-bold font-mono text-slate-800 dark:text-white">${active}</h3>
                                <span class="text-[10px] text-slate-400 font-bold tracking-tighter uppercase">NODES / ${total} ONLINE</span>
                            </div>
                        </div>
                    </div>
                `;

                // Update Database Stats with Modern List
                let dbHtml = '';
                for (const [table, count] of Object.entries(data.db_counts)) {
                    const formattedCount = count === -1 ? 'OFFLINE' : count.toLocaleString();
                    dbHtml += `
                        <div class="flex items-center justify-between px-3 py-2 hover:bg-slate-50 dark:hover:bg-white/[0.02] transition-all group cursor-default border-b border-slate-50 dark:border-white/[0.02] last:border-0">
                            <div class="flex items-center gap-2">
                                <div class="w-1 h-1 rounded-full ${count === -1 ? 'bg-accent' : 'bg-primary/30'}"></div>
                                <span class="text-[11px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-tight">${table.replace(/_/g, ' ')}</span>
                            </div>
                            <span class="font-mono text-[11px] font-bold text-slate-700 dark:text-slate-200">${formattedCount}</span>
                        </div>
                    `;
                }
                document.getElementById('db-stats-container').innerHTML = dbHtml;

                // Update Services Table
                const sortedServices = [...data.services].sort((a, b) => {
                    if (b.errors !== a.errors) return b.errors - a.errors;
                    if (b.cpu !== a.cpu) return b.cpu - a.cpu;
                    return b.ram - a.ram;
                });

                const tbody = document.querySelector('#services-table tbody');
                tbody.innerHTML = '';
                
                sortedServices.forEach((svc, i) => {
                    const cpuColor = getHeatmapColor(svc.cpu, 100);
                    const ramColor = getHeatmapColor(svc.ram, 2048);
                    
                    const tr = document.createElement('tr');
                    tr.className = `group hover:bg-slate-50 dark:hover:bg-white/[0.02] transition-colors duration-150 ${svc.status === 'OFFLINE' ? 'opacity-40' : ''}`;

                    tr.innerHTML = `
                        <td class="px-6 py-3.5">
                            <span class="font-bold text-slate-700 dark:text-slate-200 text-xs tracking-tight uppercase">${svc.name}</span>
                        </td>
                        <td class="px-4 py-3.5">
                            <span class="text-[10px] font-mono text-slate-500 dark:text-slate-400 font-bold">${svc.port}</span>
                        </td>
                        <td class="px-4 py-3.5 font-mono text-[10px] text-slate-400 uppercase tracking-tighter">${svc.pid}</td>
                        <td class="px-4 py-3.5">
                            <div class="flex items-center gap-2">
                                <div class="w-12 h-1 bg-slate-100 dark:bg-white/5 rounded-full overflow-hidden">
                                    <div class="h-full rounded-full transition-all duration-700" style="width: ${Math.min(svc.cpu, 100)}%; background: ${cpuColor}"></div>
                                </div>
                                <span class="font-mono text-[10px] font-bold text-slate-600 dark:text-slate-400">${svc.cpu}%</span>
                            </div>
                        </td>
                        <td class="px-4 py-3.5">
                            <div class="flex items-center gap-2">
                                <div class="w-12 h-1 bg-slate-100 dark:bg-white/5 rounded-full overflow-hidden">
                                    <div class="h-full rounded-full transition-all duration-700" style="width: ${Math.min((svc.ram/2048)*100, 100)}%; background: ${ramColor}"></div>
                                </div>
                                <span class="font-mono text-[10px] font-bold text-slate-600 dark:text-slate-400">${svc.ram}MB</span>
                            </div>
                        </td>
                        <td class="px-4 py-3.5">
                            ${svc.errors > 0 
                                ? `<span class="text-accent font-bold text-[9px] uppercase tracking-wider flex items-center gap-1"><div class="w-1 h-1 rounded-full bg-accent animate-pulse"></div> ${svc.errors} ERR</span>` 
                                : `<span class="text-slate-400 font-bold text-[9px] uppercase tracking-wider">Optimal</span>`}
                        </td>
                        <td class="px-6 py-3.5 text-right">
                            <div class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded border border-transparent ${svc.status === 'ONLINE' ? 'bg-success/5 text-success border-success/10' : 'bg-slate-100 dark:bg-white/5 text-slate-400'}">
                                <div class="w-1 h-1 rounded-full ${svc.status === 'ONLINE' ? 'bg-success' : 'bg-slate-400'}"></div>
                                <span class="text-[9px] font-bold uppercase tracking-widest">${svc.status}</span>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // Update Charts
                chartLabels.push(data.time);
                cpuData.push(data.total_cpu);
                ramData.push(data.ram_percent);

                if (chartLabels.length > MAX_DATA_POINTS) {
                    chartLabels.shift(); cpuData.shift(); ramData.shift();
                }

                cpuChart.update('none');
                ramChart.update('none');

            } catch (error) {
                console.error('Monitoring Sync Error:', error);
                document.getElementById('status-pulse').className = 'status-dot bg-accent';
                document.getElementById('last-update').innerText = 'CONNECTION LOST';
            }
        }

        setInterval(fetchStats, 3000);
        fetchStats();

        // Initialize Page View
        showPage('dashboard');
    </script>
</body>
</html>
