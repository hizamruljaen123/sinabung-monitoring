<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SINABUNG MONITORING</title>
    
    <!-- Theme Script -->
    <script>
        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              mainbgDark: '#0B0F19',
              mainbgLight: '#F8FAFC',
              glassbgDark: 'rgba(21, 28, 44, 0.7)',
              glassbgLight: 'rgba(255, 255, 255, 0.8)',
              textmutedDark: '#94A3B8',
              textmutedLight: '#64748B',
              primary: '#38BDF8',
              secondary: '#818CF8'
            },
            fontFamily: {
              outfit: ['Outfit', 'sans-serif'],
              inter: ['Inter', 'sans-serif'],
            },
            animation: {
              pulse2: 'pulse2 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              slideIn: 'slideIn 0.5s ease-out forwards'
            },
            keyframes: {
              pulse2: {
                '0%, 100%': { opacity: 1 },
                '50%': { opacity: .5 },
              },
              slideIn: {
                '0%': { transform: 'translateY(15px)', opacity: 0 },
                '100%': { transform: 'translateY(0)', opacity: 1 },
              }
            }
          }
        }
      }
    </script>
    <style>
        /* Smooth scrolling and clean scrollbar */
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(150, 150, 150, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(150, 150, 150, 0.5); }
        
        .dark body {
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.04), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.04), transparent 25%);
        }
        body {
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(56, 189, 248, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(129, 140, 248, 0.08), transparent 25%);
        }
    </style>
</head>
<body class="bg-mainbgLight dark:bg-mainbgDark text-slate-800 dark:text-slate-200 font-inter min-h-screen transition-colors duration-300">
    
    {% include 'components/sidebar.html' %}

    <main class="ml-64 p-8 max-w-[1600px] mx-auto min-h-screen">
        <div class="flex flex-col gap-8">
            {% include 'components/header.html' %}

            <div class="grid grid-cols-1 xl:grid-cols-[380px_1fr] gap-8 items-start">
                
                <!-- Left Column -->
                <div class="flex flex-col gap-8">
                    {% include 'components/cards.html' %}
                    {% include 'components/database.html' %}
                </div>

                <!-- Right Column -->
                <div class="flex flex-col gap-8">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="bg-glassbgLight dark:bg-glassbgDark backdrop-blur-xl border border-slate-200 dark:border-white/10 rounded-3xl p-5 shadow-lg animate-slideIn transition-colors duration-300">
                            <canvas id="cpuChart" height="160"></canvas>
                        </div>
                        <div class="bg-glassbgLight dark:bg-glassbgDark backdrop-blur-xl border border-slate-200 dark:border-white/10 rounded-3xl p-5 shadow-lg animate-slideIn transition-colors duration-300" style="animation-delay: 0.1s">
                            <canvas id="ramChart" height="160"></canvas>
                        </div>
                    </div>

                    {% include 'components/table.html' %}
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- Theme Toggle Logic ---
        var themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
        var themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

        if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            themeToggleLightIcon.classList.remove('hidden');
        } else {
            themeToggleDarkIcon.classList.remove('hidden');
        }

        var themeToggleBtn = document.getElementById('theme-toggle');

        themeToggleBtn.addEventListener('click', function() {
            themeToggleDarkIcon.classList.toggle('hidden');
            themeToggleLightIcon.classList.toggle('hidden');

            if (localStorage.getItem('color-theme')) {
                if (localStorage.getItem('color-theme') === 'light') {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                    updateChartColors(true);
                } else {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                    updateChartColors(false);
                }
            } else {
                if (document.documentElement.classList.contains('dark')) {
                    document.documentElement.classList.remove('dark');
                    localStorage.setItem('color-theme', 'light');
                    updateChartColors(false);
                } else {
                    document.documentElement.classList.add('dark');
                    localStorage.setItem('color-theme', 'dark');
                    updateChartColors(true);
                }
            }
        });

        // --- Chart Configuration ---
        const MAX_DATA_POINTS = 30;
        let chartLabels = [];
        let cpuData = [];
        let ramData = [];

        function getChartConfig(isDark) {
            return {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: { display: false },
                    y: { 
                        beginAtZero: true,
                        grid: { color: isDark ? 'rgba(255, 255, 255, 0.05)' : 'rgba(0, 0, 0, 0.05)' },
                        ticks: { color: isDark ? '#94A3B8' : '#64748B', font: { size: 10, family: 'Inter' } }
                    }
                },
                plugins: { legend: { display: false } },
                elements: {
                    line: { tension: 0.4, borderWidth: 2 },
                    point: { radius: 0 }
                },
                interaction: { intersect: false, mode: 'index' }
            };
        }

        const isDarkInitial = document.documentElement.classList.contains('dark');

        const cpuChart = new Chart(document.getElementById('cpuChart'), {
            type: 'line',
            data: { labels: chartLabels, datasets: [{ 
                label: 'CPU (%)', data: cpuData, 
                borderColor: '#38BDF8', 
                backgroundColor: 'rgba(56, 189, 248, 0.15)', 
                fill: true 
            }]},
            options: { ...getChartConfig(isDarkInitial), plugins: { title: { display: true, text: 'CLUSTER CPU LOAD', color: isDarkInitial ? '#94A3B8' : '#475569', font: { family: 'Outfit', size: 12, weight: '600' } } } }
        });

        const ramChart = new Chart(document.getElementById('ramChart'), {
            type: 'line',
            data: { labels: chartLabels, datasets: [{ 
                label: 'RAM (GB)', data: ramData, 
                borderColor: '#818CF8', 
                backgroundColor: 'rgba(129, 140, 248, 0.15)', 
                fill: true 
            }]},
            options: { ...getChartConfig(isDarkInitial), plugins: { title: { display: true, text: 'GLOBAL MEMORY UTILIZATION', color: isDarkInitial ? '#94A3B8' : '#475569', font: { family: 'Outfit', size: 12, weight: '600' } } } }
        });

        function updateChartColors(isDark) {
            const options = getChartConfig(isDark);
            const titleColor = isDark ? '#94A3B8' : '#475569';
            
            cpuChart.options = { ...options, plugins: { title: { display: true, text: 'CLUSTER CPU LOAD', color: titleColor, font: { family: 'Outfit', size: 12, weight: '600' } } } };
            ramChart.options = { ...options, plugins: { title: { display: true, text: 'GLOBAL MEMORY UTILIZATION', color: titleColor, font: { family: 'Outfit', size: 12, weight: '600' } } } };
            
            cpuChart.update();
            ramChart.update();
        }

        function getHeatmapColor(value, max) {
            const ratio = Math.min(value / max, 1);
            if (ratio < 0.3) return '#10B981'; // success
            if (ratio < 0.7) return '#FBBF24'; // warning
            return '#F43F5E'; // danger
        }

        async function fetchStats() {
            try {
                const response = await fetch('/api/stats');
                const data = await response.json();
                
                document.getElementById('last-update').innerText = `Last Sync: ${data.time}`;
                
                // Update Metrics Card
                const active = data.services.filter(s => s.status === 'ONLINE').length;
                document.getElementById('metrics-container').innerHTML = `
                    <div class="grid grid-cols-3 gap-3">
                        <div class="bg-white dark:bg-[#151c2c] border border-slate-200 dark:border-white/10 rounded-2xl p-4 shadow-sm relative overflow-hidden transition-colors duration-300">
                            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-secondary opacity-80"></div>
                            <div class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold tracking-wider mb-1 mt-1">Total CPU</div>
                            <div class="text-2xl font-bold text-slate-800 dark:text-white font-outfit">${data.total_cpu}%</div>
                        </div>
                        <div class="bg-white dark:bg-[#151c2c] border border-slate-200 dark:border-white/10 rounded-2xl p-4 shadow-sm relative overflow-hidden transition-colors duration-300">
                            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-secondary to-purple-400 opacity-80"></div>
                            <div class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold tracking-wider mb-1 mt-1">Total RAM</div>
                            <div class="text-2xl font-bold text-slate-800 dark:text-white font-outfit">${data.total_ram} <span class="text-sm">GB</span></div>
                        </div>
                        <div class="bg-white dark:bg-[#151c2c] border border-slate-200 dark:border-white/10 rounded-2xl p-4 shadow-sm relative overflow-hidden transition-colors duration-300">
                            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-400 to-teal-500 opacity-80"></div>
                            <div class="text-[10px] text-slate-500 dark:text-slate-400 uppercase font-bold tracking-wider mb-1 mt-1">Services</div>
                            <div class="text-2xl font-bold text-slate-800 dark:text-white font-outfit">${active}<span class="text-sm text-slate-400">/${data.services.length}</span></div>
                        </div>
                    </div>
                `;

                // Update Database Stats
                let dbHtml = '';
                for (const [table, count] of Object.entries(data.db_counts)) {
                    const formattedCount = count === -1 ? 'Err' : count.toLocaleString();
                    dbHtml += `
                        <div class="bg-slate-50 dark:bg-white/5 border border-slate-100 dark:border-white/5 p-3 rounded-xl flex justify-between items-center hover:shadow-md dark:hover:bg-white/10 transition-all duration-300 group">
                            <span class="text-[13px] font-medium text-slate-600 dark:text-slate-300 capitalize group-hover:text-primary transition-colors">${table.replace(/_/g, ' ')}</span>
                            <span class="font-outfit font-bold text-primary">${formattedCount}</span>
                        </div>
                    `;
                }
                document.getElementById('db-stats-container').innerHTML = dbHtml;

                // Update Table
                const sortedServices = [...data.services].sort((a, b) => {
                    if (b.errors !== a.errors) return b.errors - a.errors;
                    if (b.cpu !== a.cpu) return b.cpu - a.cpu;
                    return b.ram - a.ram;
                });

                const tbody = document.querySelector('#services-table tbody');
                tbody.innerHTML = '';
                
                sortedServices.forEach((svc, i) => {
                    const cpuColor = getHeatmapColor(svc.cpu, 100);
                    const ramColor = getHeatmapColor(svc.ram, 2000); // assume 2000MB is danger
                    
                    const tr = document.createElement('tr');
                    tr.style.animationDelay = `${i * 0.02}s`;
                    tr.className = `animate-slideIn hover:bg-slate-50 dark:hover:bg-white/5 border-b border-slate-100 dark:border-white/5 transition duration-200 ${svc.status === 'OFFLINE' ? 'opacity-40 grayscale-[0.5]' : ''}`;

                    tr.innerHTML = `
                        <td class="p-3 font-semibold text-slate-700 dark:text-slate-200 text-[13px] whitespace-nowrap">${svc.name}</td>
                        <td class="p-3"><span class="bg-sky-100 dark:bg-sky-500/10 text-sky-600 dark:text-sky-400 px-2 py-1 rounded border border-sky-200 dark:border-sky-500/20 text-xs font-mono font-medium">${svc.port}</span></td>
                        <td class="p-3 text-slate-500 dark:text-slate-400 font-mono text-xs">${svc.pid}</td>
                        <td class="p-3">
                            <div class="font-mono text-xs font-medium text-slate-700 dark:text-slate-300 mb-1.5">${svc.cpu}%</div>
                            <div class="w-[70px] h-1.5 bg-slate-200 dark:bg-white/10 rounded-full overflow-hidden">
                                <div class="h-full rounded-full transition-all duration-500" style="width: ${Math.min(svc.cpu, 100)}%; background: ${cpuColor}"></div>
                            </div>
                        </td>
                        <td class="p-3">
                            <div class="font-mono text-xs font-medium text-slate-700 dark:text-slate-300 mb-1.5">${svc.ram} MB</div>
                            <div class="w-[70px] h-1.5 bg-slate-200 dark:bg-white/10 rounded-full overflow-hidden">
                                <div class="h-full rounded-full transition-all duration-500" style="width: ${Math.min((svc.ram/2000)*100, 100)}%; background: ${ramColor}"></div>
                            </div>
                        </td>
                        <td class="p-3">
                            ${svc.errors > 0 
                                ? `<span class="bg-rose-100 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400 border border-rose-200 dark:border-rose-500/20 px-2 py-1 rounded text-[11px] font-bold shadow-sm">🔥 ${svc.errors} Logs</span>` 
                                : `<span class="text-slate-400 dark:text-slate-500 text-[11px] font-medium">Clear</span>`}
                        </td>
                        <td class="p-3">
                            <div class="flex items-center gap-2 bg-white/50 dark:bg-black/20 w-max px-2.5 py-1 rounded-full border border-slate-200 dark:border-white/5">
                                <span class="w-1.5 h-1.5 rounded-full ${svc.status === 'ONLINE' ? 'bg-emerald-500 shadow-[0_0_6px_#10B981] animate-pulse2' : 'bg-slate-400'}"></span>
                                <span class="text-[10px] uppercase tracking-wider font-bold ${svc.status === 'ONLINE' ? 'text-emerald-600 dark:text-emerald-400' : 'text-slate-500'}">${svc.status}</span>
                            </div>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

                // Update Charts
                chartLabels.push(data.time);
                cpuData.push(data.total_cpu);
                ramData.push(data.total_ram);

                if (chartLabels.length > MAX_DATA_POINTS) {
                    chartLabels.shift(); cpuData.shift(); ramData.shift();
                }

                cpuChart.update('none');
                ramChart.update('none');

            } catch (error) {
                console.error('Monitoring Sync Error:', error);
                document.getElementById('status-pulse').classList.remove('bg-emerald-500');
                document.getElementById('status-pulse').classList.add('bg-rose-500');
            }
        }

        setInterval(fetchStats, 3000);
        fetchStats();
    </script>
</body>
</html>
