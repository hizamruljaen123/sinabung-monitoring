<!-- Server Control View -->
<div id="control-view" class="page-view hidden flex flex-col gap-8 animate-fade-in">
    <div class="grid grid-cols-1 xl:grid-cols-[300px_1fr] gap-8">
        <!-- Controls Sidebar -->
        <div class="flex flex-col gap-6">
            <!-- Target Selector -->
            <div class="bg-white dark:bg-[#0A0D14] border border-slate-200 dark:border-white/5 rounded-2xl p-6 shadow-sm">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Select Target</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button id="target-be" onclick="setTarget('be')" class="target-btn px-4 py-2 bg-slate-100 dark:bg-white/5 text-slate-600 dark:text-slate-400 rounded-xl font-bold text-xs transition">BACKEND</button>
                    <button id="target-fe" onclick="setTarget('fe')" class="target-btn px-4 py-2 bg-primary text-white rounded-xl font-bold text-xs transition">FRONTEND</button>
                </div>
            </div>

            <div class="bg-white dark:bg-[#0A0D14] border border-slate-200 dark:border-white/5 rounded-2xl p-6 shadow-sm">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Git & Dependencies</h3>
                <div class="flex flex-col gap-3">
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="runGit('pull')" class="flex items-center justify-center gap-2 py-3 bg-primary text-white rounded-xl font-bold text-[10px] hover:opacity-90 transition shadow-lg shadow-primary/20">GIT PULL</button>
                        <button onclick="runGit('stash')" class="flex items-center justify-center gap-2 py-3 bg-slate-100 dark:bg-white/5 text-slate-600 dark:text-slate-400 rounded-xl font-bold text-[10px] border border-slate-200 dark:border-white/10 hover:bg-slate-200 transition">GIT STASH</button>
                    </div>
                    <button onclick="runAction('npm-install')" class="flex items-center justify-center gap-2 w-full py-3 bg-amber-500/10 text-amber-500 rounded-xl font-bold text-[10px] border border-amber-500/20 hover:bg-amber-500 hover:text-white transition">NPM INSTALL</button>
                    <button onclick="runAction('build')" class="flex items-center justify-center gap-2 w-full py-3 bg-blue-500/10 text-blue-500 rounded-xl font-bold text-[10px] border border-blue-500/20 hover:bg-blue-500 hover:text-white transition">BUILD PROJECT</button>
                </div>
            </div>

            <div class="bg-white dark:bg-[#0A0D14] border border-slate-200 dark:border-white/5 rounded-2xl p-6 shadow-sm">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Process Management</h3>
                <div class="flex flex-col gap-6">
                    <!-- Backend ID 0 -->
                    <div class="flex flex-col gap-2">
                        <p class="text-[9px] font-bold text-slate-500 uppercase">Backend Core (ID 0)</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="pm2Reload(0)" class="px-3 py-2 bg-emerald-500/10 text-emerald-500 rounded-lg font-bold text-[9px] border border-emerald-500/20 hover:bg-emerald-500 hover:text-white transition">RELOAD</button>
                            <button onclick="clearLogs(0)" class="px-3 py-2 bg-slate-100 dark:bg-white/5 text-slate-500 rounded-lg font-bold text-[9px] border border-slate-200 dark:border-white/10 hover:bg-slate-200 transition">CLEAR LOGS</button>
                        </div>
                    </div>
                    <!-- Frontend ID 1 -->
                    <div class="flex flex-col gap-2">
                        <p class="text-[9px] font-bold text-slate-500 uppercase">Frontend UI (ID 1)</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="pm2Reload(1)" class="px-3 py-2 bg-blue-500/10 text-blue-500 rounded-lg font-bold text-[9px] border border-blue-500/20 hover:bg-blue-500 hover:text-white transition">RELOAD</button>
                            <button onclick="clearLogs(1)" class="px-3 py-2 bg-slate-100 dark:bg-white/5 text-slate-500 rounded-lg font-bold text-[9px] border border-slate-200 dark:border-white/10 hover:bg-slate-200 transition">CLEAR LOGS</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white dark:bg-[#0A0D14] border border-slate-200 dark:border-white/5 rounded-2xl p-6 shadow-sm">
                <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Log Streaming</h3>
                <div class="flex flex-col gap-2">
                    <button id="btn-log-0" onclick="startLogStream(0)" class="log-tab active px-4 py-3 rounded-xl border border-primary bg-primary/5 text-primary text-xs font-bold text-left flex items-center justify-between group">
                        <span>BACKEND (ID: 0)</span>
                        <div class="w-1.5 h-1.5 rounded-full bg-primary animate-pulse"></div>
                    </button>
                    <button id="btn-log-1" onclick="startLogStream(1)" class="log-tab px-4 py-3 rounded-xl border border-transparent bg-slate-50 dark:bg-white/[0.02] text-slate-500 dark:text-slate-400 text-xs font-bold text-left flex items-center justify-between hover:bg-slate-100 dark:hover:bg-white/5 transition">
                        <span>FRONTEND (ID: 1)</span>
                        <div class="w-1.5 h-1.5 rounded-full bg-slate-400 group-hover:bg-primary transition-colors"></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Terminal View -->
        <div class="flex flex-col gap-4">
            <div class="bg-[#05070A] rounded-2xl border border-slate-800 shadow-2xl overflow-hidden flex flex-col h-[700px]">
                <div class="px-6 py-3 bg-slate-900/50 border-b border-slate-800 flex justify-between items-center">
                    <div class="flex items-center gap-2">
                        <div class="flex gap-1.5">
                            <div class="w-2.5 h-2.5 rounded-full bg-rose-500/50"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-amber-500/50"></div>
                            <div class="w-2.5 h-2.5 rounded-full bg-emerald-500/50"></div>
                        </div>
                        <span class="text-[10px] font-mono text-slate-500 uppercase ml-4 tracking-widest">Sinabung_Terminal_v4.0</span>
                    </div>
                    <button onclick="clearTerminal()" class="text-[10px] font-bold text-slate-500 hover:text-white transition">CLEAR_BUFFER</button>
                </div>
                <div id="terminal-content" class="flex-grow p-6 font-mono text-xs text-slate-300 overflow-y-auto custom-scrollbar whitespace-pre-wrap leading-relaxed">
                    <div class="text-primary opacity-50 mb-4 tracking-tighter">SINABUNG_SHELL // INITIALIZING_STREAM...</div>
                </div>
            </div>
        </div>
    </div>
</div>
