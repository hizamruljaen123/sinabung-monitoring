<!-- Control View — Compact High-Density Layout -->
<div style="display:grid;grid-template-columns:220px 1fr;gap:10px;height:100%;width:100%;">

    <!-- Left Sidebar Controls -->
    <div style="display:flex;flex-direction:column;gap:8px;overflow-y:auto;">

        <!-- Target Selector -->
        <div class="panel p-3">
            <div class="section-label mb-2">Target</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
                <button id="target-be" onclick="setTarget('be')" class="btn-action btn-ghost" style="justify-content:center;display:flex;">BACKEND</button>
                <button id="target-fe" onclick="setTarget('fe')" class="btn-action btn-primary" style="justify-content:center;display:flex;">FRONTEND</button>
            </div>
        </div>

        <!-- Env Power -->
        <div class="panel p-3">
            <div class="section-label mb-2">Environment Power</div>
            <div style="display:flex;flex-direction:column;gap:6px;">
                <!-- DEV -->
                <div class="panel-sm p-2 flex items-center justify-between">
                    <div>
                        <div style="font-size:10px;font-weight:700;color:#e2e8f0;">DEV</div>
                        <div style="font-size:8px;font-family:'JetBrains Mono';color:#475569;">:3001 / :5001</div>
                    </div>
                    <div style="display:flex;gap:4px;">
                        <button onclick="toggleEnv('dev','stop')" class="env-btn env-btn-stop">■ OFF</button>
                        <button onclick="toggleEnv('dev','start')" class="env-btn env-btn-start">▶ ON</button>
                    </div>
                </div>
                <!-- STAGING -->
                <div class="panel-sm p-2 flex items-center justify-between">
                    <div>
                        <div style="font-size:10px;font-weight:700;color:#e2e8f0;">STAGING</div>
                        <div style="font-size:8px;font-family:'JetBrains Mono';color:#475569;">:3002 / :5002</div>
                    </div>
                    <div style="display:flex;gap:4px;">
                        <button onclick="toggleEnv('staging','stop')" class="env-btn env-btn-stop">■ OFF</button>
                        <button onclick="toggleEnv('staging','start')" class="env-btn env-btn-start">▶ ON</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Git & Build -->
        <div class="panel p-3">
            <div class="section-label mb-2">Git & Build</div>
            <div style="display:flex;flex-direction:column;gap:4px;">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
                    <button onclick="runGit('pull')" class="btn-action btn-primary">GIT PULL</button>
                    <button onclick="runGit('stash')" class="btn-action btn-ghost">GIT STASH</button>
                </div>
                <button onclick="runAction('npm-install')" class="btn-action btn-amber">NPM INSTALL</button>
                <button onclick="runAction('build')" class="btn-action btn-ghost">BUILD PROJECT</button>
            </div>
        </div>

        <!-- Service Control -->
        <div class="panel p-3">
            <div class="section-label mb-2">Service Control</div>
            <div id="process-info-be" class="process-info" style="display:flex;flex-direction:column;gap:4px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                    <span class="metric-chip chip-blue">BACKEND CORE</span>
                    <span style="font-size:8px;font-family:'JetBrains Mono';color:#475569;">ID:0</span>
                </div>
                <button onclick="pm2Reload(0)" class="btn-action" style="background:rgba(16,185,129,.1);color:#10B981;border:1px solid rgba(16,185,129,.2);">RELOAD SERVICE</button>
                <button onclick="clearLogs(0)" class="btn-action btn-ghost">FLUSH LOGS</button>
            </div>
            <div id="process-info-fe" class="process-info hidden" style="display:none;flex-direction:column;gap:4px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
                    <span class="metric-chip chip-slate">FRONTEND UI</span>
                    <span style="font-size:8px;font-family:'JetBrains Mono';color:#475569;">ID:1</span>
                </div>
                <button onclick="pm2Reload(1)" class="btn-action btn-primary">RELOAD SERVICE</button>
                <button onclick="clearLogs(1)" class="btn-action btn-ghost">FLUSH LOGS</button>
            </div>
        </div>

        <!-- Log Stream Info -->
        <div class="panel p-3">
            <div class="flex items-center justify-between mb-1">
                <div class="section-label">Live Stream</div>
                <div style="display:flex;align-items:center;gap:4px;">
                    <span class="status-dot online pulse" style="width:5px;height:5px;"></span>
                    <span id="active-log-label" style="font-size:8px;font-weight:700;color:#0EA5E9;letter-spacing:.1em;">FE_LOGS</span>
                </div>
            </div>
            <p style="font-size:9px;color:#475569;line-height:1.5;">Streaming real-time logs from selected target into terminal buffer.</p>
        </div>

        <!-- Purge Logs -->
        <button onclick="fetch('/api/purge-logs',{method:'POST'}).then(()=>logToTerminal('✓ All logs purged','success'))" class="btn-action btn-danger w-full">
            ⚠ PURGE ALL LOGS
        </button>
    </div>

    <!-- Terminal -->
    <div class="panel flex flex-col overflow-hidden">
        <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0;background:#060810;">
            <div style="display:flex;align-items:center;gap:8px;">
                <div style="display:flex;gap:5px;">
                    <div style="width:10px;height:10px;border-radius:50%;background:rgba(244,63,94,.4);"></div>
                    <div style="width:10px;height:10px;border-radius:50%;background:rgba(245,158,11,.4);"></div>
                    <div style="width:10px;height:10px;border-radius:50%;background:rgba(16,185,129,.4);"></div>
                </div>
                <span style="font-size:9px;font-family:'JetBrains Mono';color:#475569;letter-spacing:.1em;">SINABUNG_TERMINAL_v5.0</span>
            </div>
            <button onclick="clearTerminal()" style="font-size:9px;font-weight:700;color:#475569;letter-spacing:.08em;cursor:pointer;padding:2px 6px;border-radius:3px;border:1px solid rgba(255,255,255,.08);">CLEAR</button>
        </div>
        <div id="terminal-content" style="flex:1;overflow-y:auto;padding:12px;font-family:'JetBrains Mono';font-size:10px;color:#94a3b8;line-height:1.7;background:#060810;white-space:pre-wrap;">
            <span style="color:#0EA5E9;opacity:.6;">SINABUNG_SHELL // STREAM_READY...</span>
        </div>
    </div>
</div>

<script>
function logToTerminal(msg, type='info') {
    const t = document.getElementById('terminal-content');
    const colors = { success:'#10B981', error:'#F43F5E', warn:'#F59E0B', info:'#0EA5E9' };
    t.innerHTML += `\n<span style="color:${colors[type]||colors.info}">${msg}</span>`;
    t.scrollTop = t.scrollHeight;
}
</script>
