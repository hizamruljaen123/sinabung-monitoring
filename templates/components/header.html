<header class="flex justify-between items-center py-4 px-2">
    <div class="space-y-1">
        <div class="flex items-center gap-2">
            <span class="flex h-2 w-2 rounded-full bg-primary shadow-[0_0_10px_theme('colors.primary')]"></span>
            <p class="text-primary text-[10px] uppercase tracking-[0.3em] font-bold">Sinabung Cluster v4.0</p>
        </div>
        <h1 class="font-outfit text-3xl font-bold text-slate-800 dark:text-white tracking-tight">
            Infrastructure <span class="text-slate-400 dark:text-slate-500 font-light">Status</span>
        </h1>
    </div>
    
    <div class="flex items-center gap-6">
        <div class="hidden xl:flex items-center gap-4 text-right">
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Operational Mode</p>
                <p class="text-xs font-semibold text-slate-700 dark:text-slate-200">PRODUCTION_READY</p>
            </div>
            <div class="h-8 w-px bg-slate-200 dark:bg-white/10"></div>
            <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider">Current Node</p>
                <p class="text-xs font-semibold text-slate-700 dark:text-slate-200">MASTER_NODE_01</p>
            </div>
        </div>

        <div class="glass-panel px-5 py-2.5 rounded-2xl flex items-center gap-3 border shadow-sm group">
            <div class="relative flex items-center justify-center">
                <div id="status-pulse" class="status-dot bg-success"></div>
            </div>
            <div class="flex flex-col">
                <span id="last-update" class="text-[10px] font-bold text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">SYNCING DATA...</span>
                <span class="text-[9px] text-slate-400 dark:text-slate-500 uppercase tracking-tighter">Real-time Stream Active</span>
            </div>
        </div>
    </div>
</header>
